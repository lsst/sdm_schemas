    datatype: float
    ivoa:unit: nJy
    ivoa:ucd: phot.count
    '@id': '#DiaSource.psfFlux'
  - name: psfFluxErr
    description: Uncertainty of psfFlux.
    datatype: float
    ivoa:unit: nJy
    '@id': '#DiaSource.psfFluxErr'
  - name: psfChi2
    description: Chi^2 statistic of the point source model fit.
    datatype: float
