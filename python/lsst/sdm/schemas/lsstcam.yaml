    ivoa:unit: pixel
    ivoa:ucd: stat.error;pos.cartesian.x
    '@id': '#DiaSource.xErr'
  - name: y
    description: Unweighted first moment centroid, overall centroid.
    datatype: double
    nullable: false
    ivoa:unit: pixel
    ivoa:ucd: pos.cartesian.y
