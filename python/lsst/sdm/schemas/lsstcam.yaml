  - name: psfFlux_flag
    description: Failure to derive linear least-squares fit of psf model forced on
      the calexp
    datatype: boolean
    tap:principal: 0
    '@id': '#ForcedSource.psfFlux_flag'
  - name: psfDiffFlux
    description: Flux derived from linear least-squares fit of psf model forced on
      the image difference
    datatype: float
    ivoa:unit: nJy
    tap:principal: 1
    '@id': '#ForcedSource.psfDiffFlux'
  - name: psfDiffFluxErr
