  - name: z_ap50Flux_flag
    description: Flag set for any failure with the 50.0-pixel aperture flux. Forced on z-band.
    datatype: boolean
    '@id': '#Object.z_ap50Flux_flag'
  - name: z_ap70Flux
    description: Flux within 70.0-pixel aperture. Forced on z-band.
