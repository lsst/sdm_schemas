  - name: patch
    description: Skymap patch ID
    datatype: long
    tap:principal: 0
    '@id': '#ForcedSourceOnDiaObject.patch'
  constraints:
  - name: fk_ForcedSourceOnDiaobject_DiaObject
    '@id': '#ForcedSourceOnDiaObject.fk_ForcedSourceOnDiaobject_DiaObject'
    description: Link a DiaObject to its associated ForcedSourceOnDiaObjects
    '@type': ForeignKey
    columns:
    - '#ForcedSourceOnDiaObject.diaObjectId'
    referencedColumns:
    - '#DiaObject.diaObjectId'
  - name: fk_ForcedSourceOnDiaObject_Visit
    '@id': '#ForcedSourceOnDiaObject.fk_ForcedSourceOnDiaObject_Visit'
