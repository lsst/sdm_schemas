    description: Flux uncertainty within 70.0-pixel aperture. Forced on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_ap70FluxErr'
  - name: z_ap70Flux_flag
    description: Flag set for any failure with the 70.0-pixel aperture flux. Forced on z-band.
    datatype: boolean
    '@id': '#Object.z_ap70Flux_flag'
  - name: z_extendedness
    description: Flux-ratio measure of whether an object is point-like (0) or extended (1). Measured on z-band.
    datatype: float
    '@id': '#Object.z_extendedness'
  - name: z_sizeExtendedness
    description: Moments-based measure of whether an object is point-like (0) or extended (1). Measured on z-band.
    datatype: float
    '@id': '#Object.z_sizeExtendedness'
  - name: z_blendedness
    description: Measure of how much the flux is affected by neighbors, (1 - child_flux/parent_flux).  Operates
      on the absolute value of the pixels to try to obtain a de-noised value.  See
      section 4.9.11 of Bosch et al. 2018, PASJ, 70, S5 for details. Measured on z-band.
    datatype: float
    '@id': '#Object.z_blendedness'
  - name: z_cModelFlux
    description: Flux from the final CModel fit. Forced on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_cModelFlux'
  - name: z_cModelFluxErr
    description: Flux uncertainty from the final CModel fit. Forced on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_cModelFluxErr'
  - name: z_cModelMag
    description: AB magnitude of cModelFlux. Forced on z-band.
    datatype: float
    ivoa:unit: mag
    tap:principal: 1
    '@id': '#Object.z_cModelMag'
  - name: z_cModelMagErr
    description: Uncertainty in magnitudes on cModelFlux. Forced on z-band.
    datatype: float
    ivoa:unit: mag
    tap:principal: 1
    '@id': '#Object.z_cModelMagErr'
  - name: z_cModelFlux_inner
    description: Flux within the fit region, with no extrapolation. Forced on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_cModelFlux_inner'
  - name: z_free_cModelFlux
    description: Flux from the final CModel fit. Measured on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_free_cModelFlux'
  - name: z_free_cModelFluxErr
    description: Flux uncertainty from the final CModel fit. Measured on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_free_cModelFluxErr'
  - name: z_free_cModelFlux_inner
    description: Flux within the fit region, with no extrapolation. Measured on z-band.
    datatype: float
    ivoa:unit: nJy
    '@id': '#Object.z_free_cModelFlux_inner'
  - name: z_free_cModelFlux_flag
    description: Flag set if the final CModel fit (or any previous fit) failed. Measured
      on z-band.
    datatype: boolean
    '@id': '#Object.z_free_cModelFlux_flag'
  - name: z_hsmShapeRegauss_e1
    description: PSF-corrected shear using the Hirata & Seljak (2003) Regaussianization algorithm.
      Measured on z-band.
    datatype: float
    '@id': '#Object.z_hsmShapeRegauss_e1'
  - name: z_hsmShapeRegauss_e2
    description: PSF-corrected shear using the Hirata & Seljak (2003) Regaussianization algorithm.
      Measured on z-band.
    datatype: float
    '@id': '#Object.z_hsmShapeRegauss_e2'
  - name: z_hsmShapeRegauss_sigma
    description: PSF-corrected shear using the Hirata & Seljak (2003) Regaussianization algorithm.
      Measured on z-band.
    datatype: float
    '@id': '#Object.z_hsmShapeRegauss_sigma'
  - name: z_hsmShapeRegauss_flag
    description: Flag set for any failure with the Regaussianziation shapes. Measured on z-band.
    datatype: boolean
    '@id': '#Object.z_hsmShapeRegauss_flag'
  - name: z_moments_uu
    description: Adaptive Gaussian-weighted second moments in a local gnomonic projection, with u aligned with RA and v aligned with dec.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_uu'
  - name: z_moments_vv
    description: Adaptive Gaussian-weighted second moments in a local gnomonic projection, with u aligned with RA and v aligned with dec.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_vv'
  - name: z_moments_uv
    description: Adaptive Gaussian-weighted second moments in a local gnomonic projection, with u aligned with RA and v aligned with dec.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_uv'
  - name: z_moments_flag
    description: General failure flag for moments measurement.
    datatype: boolean
    '@id': '#Object.z_moments_flag'
  - name: z_moments_psf_uu
    description: Adaptive Gaussian-weighted second moments of the PSF model at the position of the object, in a local gnomonic projection.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_psf_uu'
  - name: z_moments_psf_vv
    description: Adaptive Gaussian-weighted second moments of the PSF model at the position of the object, in a local gnomonic projection.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_psf_vv'
  - name: z_moments_psf_uv
    description: Adaptive Gaussian-weighted second moments of the PSF model at the position of the object, in a local gnomonic projection.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_psf_uv'
  - name: z_moments_psf_flag
    description: General failure flag for PSF moments measurement.
    datatype: boolean
    '@id': '#Object.z_moments_psf_flag'
  - name: z_moments_round_uu
    description: Adaptive circular Gaussian-weighted second moments PSF moments, in a local gnomonic projection, with u aligned with RA and v aligned with dec.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_round_uu'
  - name: z_moments_round_vv
    description: Adaptive circular Gaussian-weighted second moments PSF moments, in a local gnomonic projection, with u aligned with RA and v aligned with dec.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_round_vv'
  - name: z_moments_round_uv
    description: Adaptive circular Gaussian-weighted second moments PSF moments, in a local gnomonic projection, with u aligned with RA and v aligned with dec.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_round_uv'
  - name: z_moments_round_flag
    description: General failure flag for circular moments measurement.
    datatype: boolean
    '@id': '#Object.z_moments_round_flag'
  - name: z_moments_psf_debiased_uu
    description: Adaptive Gaussian-weighted second moments of the PSF model, after adding noise to match the signal-to-noise ratio of the object.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_psf_debiased_uu'
  - name: z_moments_psf_debiased_vv
    description: Adaptive Gaussian-weighted second moments of the PSF model, after adding noise to match the signal-to-noise ratio of the object.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_psf_debiased_vv'
  - name: z_moments_psf_debiased_uv
    description: Adaptive Gaussian-weighted second moments of the PSF model, after adding noise to match the signal-to-noise ratio of the object.
    datatype: float
    ivoa:unit: arcsec**2
    '@id': '#Object.z_moments_psf_debiased_uv'
  - name: z_moments_psf_debiased_flag
    description: General failure flag for debiased PSF moments measurement.
    datatype: boolean
    '@id': '#Object.z_moments_psf_debiased_flag'
  - name: z_moments_a
    description: Semimajor axis length of the adaptive Gaussian-weighted second moments.
    datatype: float
    ivoa:unit: arcsec
    '@id': '#Object.z_moments_a'
  - name: z_moments_b
    description: Semiminor axis length of the adaptive Gaussian-weighted second moments.
    datatype: float
    ivoa:unit: arcsec
    '@id': '#Object.z_moments_b'
  - name: z_moments_theta
    description: Position angle of the adaptive Gaussian-weighted second moments.
    datatype: float
    ivoa:unit: deg
    '@id': '#Object.z_moments_theta'
  - name: z_hsm_moments_30
    description: HSM higher-order moment 30. Measured on z-band.
    datatype: float
    '@id': '#Object.z_hsm_moments_30'
  - name: z_hsm_momentsPsf_30
    description: HSM higher-order moment 30 measured on the PSF model at the position of the object. Measured on z-band.
    datatype: float
    '@id': '#Object.z_hsm_momentsPsf_30'
  - name: z_hsm_moments_21
    description: HSM higher-order moment 21. Measured on z-band.
    datatype: float
