    tap:principal: 0
    '@id': '#ForcedSource.patch'
  constraints:
  - name: fk_ForcedSource_Object
    '@id': '#ForcedSource.fk_ForcedSource_Object'
    description: Link an Object to its associated ForcedSources
    '@type': ForeignKey
    columns:
    - '#ForcedSource.objectId'
    referencedColumns:
    - '#Object.objectId'
  - name: fk_ForcedSource_Visit
    '@id': '#ForcedSource.fk_ForcedSource_Visit'
    description: Link a ForcedSource to its associated visit
    '@type': ForeignKey
    columns:
    - '#ForcedSource.visit'
    referencedColumns:
    - '#Visit.visit'
  indexes:
  - name: idx_ForcedSource_objectId
    description: Non-unique index on the objectId column; accelerates retrieval of light curves for Objects
    '@id': '#ForcedSource.idx_ForcedSource_objectId'
    description: Non-unique index on the objectId column; accelerates retrieval of
