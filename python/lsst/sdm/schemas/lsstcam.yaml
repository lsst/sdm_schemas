      psf model forced on the image difference
    datatype: float
    ivoa:unit: nJy
    tap:principal: 1
    '@id': '#ForcedSource.psfDiffFluxErr'
  - name: psfDiffFlux_flag
    description: Failure to derive linear least-squares fit of psf model forced on
