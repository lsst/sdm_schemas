---
name: ppdb
description: |
  The Prompt Products Database stores results from nightly and daily processing
  that detects time-variable astrophysical phenomena, including
  difference-image detections, associated objects, and Solar System objects.
version: "10.0.0"
resources:
  apdb:
    uri: "apdb.yaml"
tables:
- name: DiaObject
  description: Astronomical objects detected on one or more difference images
  primaryKey:
  - "#DiaObject.diaObjectId"
  - "#DiaObject.validityStartMjdTai"
  columnRefs:
    apdb:
      DiaObject:
        diaObjectId:
        validityStartMjdTai:
        validityEndMjdTai:
        ra:
        raErr:
        dec:
        decErr:
        ra_dec_Cov:
        u_psfFluxMean:
        u_psfFluxMeanErr:
        u_psfFluxSigma:
        u_psfFluxNdata:
        u_fpFluxMean:
        u_fpFluxMeanErr:
        g_psfFluxMean:
        g_psfFluxMeanErr:
        g_psfFluxSigma:
        g_psfFluxNdata:
        g_fpFluxMean:
        g_fpFluxMeanErr:
        r_psfFluxMean:
        r_psfFluxMeanErr:
        r_psfFluxSigma:
        r_psfFluxNdata:
        r_fpFluxMean:
        r_fpFluxMeanErr:
        i_psfFluxMean:
        i_psfFluxMeanErr:
        i_psfFluxSigma:
        i_psfFluxNdata:
        i_fpFluxMean:
        i_fpFluxMeanErr:
        z_psfFluxMean:
        z_psfFluxMeanErr:
        z_psfFluxSigma:
        z_psfFluxNdata:
        z_fpFluxMean:
        z_fpFluxMeanErr:
        y_psfFluxMean:
        y_psfFluxMeanErr:
        y_psfFluxSigma:
        y_psfFluxNdata:
        y_fpFluxMean:
        y_fpFluxMeanErr:
        u_scienceFluxMean:
        u_scienceFluxMeanErr:
        g_scienceFluxMean:
        g_scienceFluxMeanErr:
        r_scienceFluxMean:
        r_scienceFluxMeanErr:
        i_scienceFluxMean:
        i_scienceFluxMeanErr:
        z_scienceFluxMean:
        z_scienceFluxMeanErr:
        y_scienceFluxMean:
        y_scienceFluxMeanErr:
        u_psfFluxMin:
        u_psfFluxMax:
        u_psfFluxMaxSlope:
        u_psfFluxErrMean:
        g_psfFluxMin:
        g_psfFluxMax:
        g_psfFluxMaxSlope:
        g_psfFluxErrMean:
        r_psfFluxMin:
        r_psfFluxMax:
        r_psfFluxMaxSlope:
        r_psfFluxErrMean:
        i_psfFluxMin:
        i_psfFluxMax:
        i_psfFluxMaxSlope:
        i_psfFluxErrMean:
        z_psfFluxMin:
        z_psfFluxMax:
        z_psfFluxMaxSlope:
        z_psfFluxErrMean:
        y_psfFluxMin:
        y_psfFluxMax:
        y_psfFluxMaxSlope:
        y_psfFluxErrMean:
        firstDiaSourceMjdTai:
        lastDiaSourceMjdTai:
        nDiaSources:
- name: DiaSource
  description: Difference image sources detected on difference images
  primaryKey: "#DiaSource.diaSourceId"
