- name: DiaForcedSource
  description: >
    Forced-photometry source measurement on an individual difference
    Exposure for all objects in the DiaObject table
  columnRefs:
    apdb:
      DiaForcedSource:
        diaForcedSourceId:
        diaObjectId:
        ra:
        dec:
        visit:
        detector:
        psfFlux:
        psfFluxErr:
        midpointMjdTai:
        scienceFlux:
        scienceFluxErr:
        band:
        timeProcessedMjdTai:
        timeWithdrawnMjdTai:
