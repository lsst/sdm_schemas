    datatype: timestamp
    precision: 6
    tap:column_index: 6
    votable:arraysize: '*'
    votable:xtype: timestamp
  - name: expMidptMJD
    description: Midpoint time for exposure at the fiducial center of the focal plane
      array in MJD. TAI, accurate to 10ms.
    datatype: double
    ivoa:ucd: time.epoch;obs.exposure
    ivoa:unit: d
    tap:column_index: 5
    tap:principal: 1
  - name: expTime
