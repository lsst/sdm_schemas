    datatype: float
    ivoa:unit: nJy
    tap:principal: 1
  - name: psfDiffFlux_flag
    description: Failure to derive linear least-squares fit of psf model forced on
      the image difference
    datatype: boolean
    nullable: false
  - name: psfFlux
