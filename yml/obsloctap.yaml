---
name: ivoa
"@id": "#ivoa_obsplan"
description: Observation Locator Table Access Protocol Version 1.0
tables:
  - name: obsplan
    "@id": "#obsplan"
    description: Metadata in the ObsLocTap relational realization of
      the IVOA ObsLocTap data model
    tap:table_index: 1
    columns:
      - name: t_planning
        "@id": "#obsplan.t_planning"
        description: Time in MJD when this observation has been added or
          modified into the planning log
        nullable: false
        ivoa:ucd:
        votable:utype:
        tap:std: 1
        tap:principal: 1
        tap:column_index: 1
        ivoa:unit: d
        datatype: double
        votable:arraysize:
      - name: target_name
        "@id": "#obsplan.target_name"
        description: Astronomical object observed, if any
        nullable: true
        ivoa:ucd: meta.id;src
        votable:utype: Target.name
        tap:std: 1
        tap:principal: 1
        tap:column_index: 2
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 40
      - name: obs_id
        "@id": "#obsplan.obs_id"
        description: Observation ID
        nullable: false
        ivoa:ucd: meta.id
        votable:utype: DataID.observationID
        tap:std: 1
        tap:principal: 1
        tap:column_index: 3
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 40
      - name: obs_collection
        "@id": "#obsplan.obs_collection"
        description: Name of the data collection
        nullable: true
        ivoa:ucd: meta.id
        votable:utype: DataID.collection
        tap:std: 1
        tap:principal: 1
        tap:column_index: 4
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 80
      - name: s_ra
        "@id": "#obsplan.s_ra"
        description: Central right ascension, ICRS
        nullable: true
        ivoa:ucd: pos.eq.ra
        votable:utype:
          Char.SpatialAxis.Coverage.Location.Coord.Position2D.Value2.C1
        tap:std: 1
        tap:principal: 1
        tap:column_index: 5
        ivoa:unit: deg
        datatype: double
      - name: s_dec
        "@id": "#obsplan.s_dec"
        description: Central declination, ICRS
        nullable: true
        ivoa:ucd: pos.eq.dec
        votable:utype:
          Char.SpatialAxis.Coverage.Location.Coord.Position2D.Value2.C2
        tap:std: 1
        tap:principal: 0
        tap:column_index: 6
        ivoa:unit: deg
        datatype: double
        votable:arraysize:
      - name: s_fov
        "@id": "#obsplan.s_fov"
        description: Diameter (bounds) of the covered region
        nullable: true
        ivoa:ucd: phys.angSize;instr.fov
        votable:utype: Char.SpatialAxis.Coverage.Bounds.Extent.diameter
        tap:std: 1
        tap:principal: 0
        tap:column_index: 7
        ivoa:unit: deg
        datatype: double
        votable:arraysize:
      - name: s_region
        "@id": "#obsplan.s_region"
        description: Sky region covered by the data product
          (expressed in ICRS frame)
        nullable: true
        ivoa:ucd: pos.outline;obs.field
        votable:utype: Char.SpatialAxis.Coverage.Support.Area
        tap:std: 1
        tap:principal: 0
        tap:column_index: 8
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 400
      - name: s_resolution
        "@id": "#obsplan.s_resolution"
        description: Spatial resolution of data as FWHM
        nullable: true
        ivoa:ucd: pos.angResolution
        votable:utype: Char.SpatialAxis.Resolution.Refval.value
        tap:std: 1
        tap:principal: 0
        tap:column_index: 9
        ivoa:unit: arcsec
        datatype: double
        votable:arraysize:
      - name: t_min
        "@id": "#obsplan.t_min"
        description: Start time in MJD
        nullable: false
        ivoa:ucd: time.start;obs.exposure
        votable:utype: Char.TimeAxis.Coverage.Bounds.Limits.StartTime
        tap:std: 1
        tap:principal: 1
        tap:column_index: 10
        ivoa:unit: d
        datatype: double
        votable:arraysize:
      - name: t_max
        "@id": "#obsplan.t_max"
        description: Stop time in MJD
        nullable: false
        ivoa:ucd: time.end;obs.exposure
        votable:utype: Char.TimeAxis.Coverage.Bounds.Limits.StopTime
        tap:std: 1
        tap:principal: 1
        tap:column_index: 11
        ivoa:unit: d
        datatype: double
        votable:arraysize:
      - name: t_exptime
        "@id": "#obsplan.t_exptime"
        description: Total exposure time
        nullable: false
        ivoa:ucd: time.duration;obs.exposure
        votable:utype: Char.TimeAxis.Coverage.Support.Extent
        tap:std: 1
        tap:principal: 1
        tap:column_index: 12
        ivoa:unit: s
        datatype: double
      - name: t_resolution
        "@id": "#obsplan.t_resolution"
        description: Temporal resolution FWHM
        nullable: true
        ivoa:ucd: time.resolution
        votable:utype: Char.TimeAxis.Resolution.Refval.value
        tap:std: 1
        tap:principal: 0
        tap:column_index: 13
        ivoa:unit: s
        datatype: double
      - name: em_min
        "@id": "#obsplan.em_min"
        description: Start in spectral coordinates
        nullable: true
        ivoa:ucd: em.wl;stat.min
        votable:utype: Char.SpectralAxis.Coverage.Bounds.Limits.LoLimit
        tap:std: 1
        tap:principal: 0
        tap:column_index: 14
        ivoa:unit: m
        datatype: double
      - name: em_max
        "@id": "#obsplan.em_max"
        description: Stop in spectral coordinates
        nullable: true
        ivoa:ucd: em.wl;stat.max
        votable:utype: Char.SpectralAxis.Coverage.Bounds.Limits.HiLimit
        tap:std: 1
        tap:principal: 0
        tap:column_index: 15
        ivoa:unit: m
        datatype: double
        votable:arraysize:
      - name: em_res_power
        "@id": "#obsplan.em_res_power"
        description: Spectral resolving power
        nullable: true
        ivoa:ucd: spect.resolution
        votable:utype: Char.SpectralAxis.Resolution.ResolPower.refVal
        tap:std: 1
        tap:principal: 0
        tap:column_index: 16
        ivoa:unit:
        datatype: double
      - name: o_ucd
        "@id": "#obsplan.o_ucd"
        description: UCD of observable (e.g., phot.flux.density,
          phot.count, etc.)
        nullable: true
        ivoa:ucd: meta.ucd
        votable:utype: Char.ObservableAxis.ucd
        tap:std: 1
        tap:principal: 0
        tap:column_index: 17
        ivoa:unit:
        datatype: string
        length: 40
        votable:arraysize: "*"
      - name: pol_states
        "@id": "#obsplan.pol_states"
        description: List of polarization states or NULL if not applicable
        nullable: true
        ivoa:ucd: meta.code;phys.polarization
        votable:utype: Char.PolarizationAxis.stateList
        tap:std: 1
        tap:principal: 0
        tap:column_index: 18
        ivoa:unit:
        datatype: string
        length: 40
        votable:arraysize: "*"
      - name: pol_xel
        "@id": "#obsplan.pol_xel"
        description: Number of polarization samples
        nullable: true
        ivoa:ucd: meta.number
        votable:utype: Char.PolarizationAxis.numBins
        tap:std: 1
        tap:principal: 0
        tap:column_index: 19
        ivoa:unit:
        datatype: int
      - name: facility_name
        "@id": "#obsplan.facility_name"
        description: Name of the facility used for this observation
        nullable: false
        ivoa:ucd: meta.id;instr.tel
        votable:utype: Provenance.ObsConfig.Facility.name
        tap:std: 1
        tap:principal: 1
        tap:column_index: 20
        ivoa:unit: d
        datatype: string
        votable:arraysize: "*"
        length: 40
      - name: instrument_name
        "@id": "#obsplan.instrument_name"
        description: Name of the instrument used for this observation
        nullable: true
        ivoa:ucd: meta.id;instr
        votable:utype: Provenance.ObsConfig.Instrument.name
        tap:std: 1
        tap:principal: 1
        tap:column_index: 21
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 40
      - name: t_plan_exptime
        "@id": "#obsplan.t_plan_exptime"
        description: Planned or scheduled exposure time
        nullable: true
        ivoa:ucd: time.duration;obs.exposure
        votable:utype: Char.TimeAxis.Coverage.Support.Extent
        tap:std: 1
        tap:principal: 0
        tap:column_index: 22
        ivoa:unit: s
        datatype: double
      - name: category
        "@id": "#obsplan.category"
        description: Observation category. One of the following
          values Fixed, Coordinated, Window, Other
        nullable: false
        ivoa:ucd:
        votable:utype:
        tap:std: 1
        tap:principal: 1
        tap:column_index: 23
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 11
      - name: priority
        "@id": "#obsplan.priority"
        description: "Priority level { 0, 1, 2}"
        nullable: false
        ivoa:ucd:
        votable:utype:
        tap:std: 1
        tap:principal: 1
        tap:column_index: 24
        ivoa:unit:
        datatype: int
      - name: execution_status
        "@id": "#obsplan.execution_status"
        description: One of the following values\u0003A
          Planned, Scheduled, Unscheduled, Performed, Aborted
        nullable: false
        ivoa:ucd:
        votable:utype:
        tap:std: 1
        tap:principal: 1
        tap:column_index: 25
        ivoa:unit:
        datatype: string
        votable:arraysize: "*"
        length: 11
      - name: tracking_type
        "@id": "#obsplan.tracking_type"
        description: One of the following values\u0003A
          Sidereal, Solar-system-object-tracking, Fixed-az-el-transit
        nullable: false
        ivoa:ucd:
        votable:utype:
        tap:std: 1
        tap:principal: 0
        tap:column_index: 26
        ivoa:unit: m
        datatype: string
        votable:arraysize: "*"
        length: 40
      - name: rubin_rot_sky_pos
        "@id": "#obsplan.rubin_rot_sky_pos"
        description: From scheduler rotation angle
          Not in the IVOA obsplan table
        nullable: true
        tap:std: 1
        tap:principal: 0
        tap:column_index: 27
        ivoa:unit: deg
        datatype: float
      - name: rubin_nexp
        "@id": "#obsplan.rubin_nexp"
        description: number of exposures to take usually 1 or 2
          Not in the IVOA obsplan table
        nullable: true
        tap:std: 1
        tap:principal: 0
        tap:column_index: 28
        datatype: int
